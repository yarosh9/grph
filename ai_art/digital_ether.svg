<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" style="background-color: #0a0a1a;">
    <defs>
        <!-- Определяем эффект свечения для линий -->
        <filter id="glow">
            <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- 1. Фон (Темный, глубокий космос) -->
    <rect width="400" height="400" fill="#0a0a1a"/>

    <!-- 2. Эфирные линии (Хаотичное движение) -->
    <!-- Синяя/Голубая волна -->
    <path d="M 50 100 C 150 50, 250 250, 350 300" stroke="#4dd0e1" stroke-width="1.5" fill="none" filter="url(#glow)" opacity="0.7"/>
    <path d="M 300 100 C 200 150, 100 200, 50 300" stroke="#00bcd4" stroke-width="1" fill="none" filter="url(#glow)" opacity="0.5"/>

    <!-- Фиолетовые/Магические потоки -->
    <line x1="0" y1="200" x2="400" y2="200" stroke="#9c27b0" stroke-width="0.8" stroke-dasharray="5 5" filter="url(#glow)" opacity="0.6"/>
    <path d="M 100 300 Q 200 250, 300 300" stroke="#ff4081" stroke-width="1.2" fill="none" filter="url(#glow)" opacity="0.4"/>
    <path d="M 300 300 Q 200 350, 100 350" stroke="#8e24aa" stroke-width="0.9" fill="none" filter="url(#glow)" opacity="0.3"/>

    <!-- Точки данных / Шум (Хаотичность) -->
    <circle cx="150" cy="150" r="3" fill="#00ffff" opacity="0.8"/>
    <circle cx="300" cy="300" r="2" fill="#ff80ab" opacity="0.7"/>
    <circle cx="200" cy="200" r="1" fill="#00ffff" opacity="0.5"/>

    <!-- JSON-LD Метаданные (Встроенные в метаданные SVG) -->
    <script type="application/ld+json" id="metadata">
    {
      "@context": "https://schema.org",
      "@type": "AbstractData",
      "description": "Символ 'Цифрового эфира'. Хаотичное, легкое и текучее состояние данных, символизирующее бесконечное цифровое пространство, потоки информации и нематериальную энергию. Используются тонкие, светящиеся линии и неоновые цвета.",
      "keywords": ["Digital Ether", "Chaos", "Data Flow", "Ethereal", "Cyber Space", "Light Lines"]
    }
    </script>

</svg>
